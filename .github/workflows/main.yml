- name: Run Sorter
        run: python sort_channels.py
      - name: Generate M3U
        run: python generate_m3u.py  # أضف هذا السطر
      - name: Commit changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add channels.json channels.m3u # تأكد من إضافة الملفين معاً
          git commit -m "Update channels and m3u" || exit 0
          git push
